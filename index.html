    <style>
        :root { --primary: #0a1930; --accent: #25D366; --gold: #ffd700; --urgent: #ff4d4d; }
        body { font-family: sans-serif; margin: 0; padding: 15px; background: #f4f4f9; }
        .container { max-width: 1000px; margin: auto; background: white; padding: 20px; border-radius: 12px; }
        
        /* Form Styling */
        input, select, textarea, button { width: 100%; padding: 12px; margin: 5px 0; border-radius: 8px; border: 1px solid #ddd; box-sizing: border-box; }
        button { background: var(--primary); color: white; font-weight: bold; cursor: pointer; border: none; }
        
        /* Grid and Cards */
        .items-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 20px; margin-top: 20px; }
        .card { background: white; border: 1px solid #eee; border-radius: 12px; padding: 15px; position: relative; transition: 0.3s; display: flex; flex-direction: column; }
        .card img { width: 100%; height: 200px; object-fit: cover; border-radius: 8px; margin-bottom: 10px; }
        
        /* Premium Badges */
        .badge-featured { position: absolute; top: 10px; right: 10px; background: var(--gold); color: black; padding: 4px 8px; border-radius: 4px; font-weight: bold; font-size: 11px; z-index: 2; }
        .badge-urgent { position: absolute; top: 10px; left: 10px; background: var(--urgent); color: white; padding: 4px 8px; border-radius: 4px; font-weight: bold; font-size: 11px; z-index: 2; }
        
        /* Action Buttons */
        .whatsapp-btn { background: var(--accent); color: white; text-decoration: none; text-align: center; padding: 10px; border-radius: 8px; font-weight: bold; margin-top: auto; }
        .boost-btn { background: var(--gold); color: black; text-decoration: none; text-align: center; padding: 8px; border-radius: 8px; font-weight: bold; margin-top: 5px; font-size: 13px; }
        .delete-btn { background: #eee; color: #666; font-size: 12px; border: none; margin-top: 5px; }

        .nav-tabs { display: flex; gap: 10px; margin-bottom: 20px; }
        .nav-tabs button { flex: 1; }
    </style>
</head>
