<!DOCTYPE html>
<html>

<head>
<title>UAE Market Hub AE</title>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<style>

body{
font-family:Arial;
margin:40px;
}

input,button{
width:100%;
padding:10px;
margin:6px 0;
}

button{
background:#0a1930;
color:white;
border:none;
cursor:pointer;
}

</style>

</head>

<body>

<h1>UAE Market Hub AE</h1>

<h3>Login / Sign Up</h3>

<input id="email" placeholder="Email">
<input id="password" type="password" placeholder="Password">

<button onclick="signup()">Sign Up</button>
<button onclick="login()">Login</button>
<button onclick="logout()">Logout</button>

<p id="status">Not logged in</p>

<hr>

<h2>Post Item</h2>

<input id="title" placeholder="Item name">
<input id="price" placeholder="Price">
<input id="location" placeholder="Location">

<button onclick="postItem()">Post Item</button>

<hr>

<h2>Items</h2>

<div id="items"></div>

<script>

const SUPABASE_URL = "https://pseajfcwbirfplujhlye.supabase.co"

const SUPABASE_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InBzZWFqZmN3YmlyZnBsdWpobHllIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzMxMzk2NjksImV4cCI6MjA4ODcxNTY2OX0.hnDRhO7DX2n0RZoLD9LjdwxlOEch4dTwjhqzE4m_Q8Q"

const { createClient } = supabase
const client = createClient(SUPABASE_URL, SUPABASE_KEY)


async function signup(){

const email=document.getElementById("email").value
const password=document.getElementById("password").value

const {error}=await client.auth.signUp({
email:email,
password:password
})

if(error) alert(error.message)
else alert("Signup successful! Check email.")

}


async function login(){

const email=document.getElementById("email").value
const password=document.getElementById("password").value

const {error}=await client.auth.signInWithPassword({
email:email,
password:password
})

if(error) alert(error.message)
else{
document.getElementById("status").innerText="Logged in as "+email
}

}


async function logout(){

await client.auth.signOut()

document.getElementById("status").innerText="Not logged in"

}


async function postItem(){

const title=document.getElementById("title").value
const price=document.getElementById("price").value
const location=document.getElementById("location").value

const {error}=await client
.from("items")
.insert([{title,price,location}])

if(error) alert(error.message)
else{
alert("Item posted!")
loadItems()
}

}


async function loadItems(){

const {data}=await client
.from("items")
.select("*")
.order("id",{ascending:false})

let html=""

data.forEach(item=>{
html+=`
<div style="border:1px solid #ccc;padding:10px;margin:10px 0">
<h3>${item.title}</h3>
<p>Price: ${item.price}</p>
<p>Location: ${item.location}</p>
</div>
`
})

document.getElementById("items").innerHTML=html

}

loadItems()

</script>

</body>
</html>
