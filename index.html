<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>UAE Market Hub AE</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        :root {
            --primary: #0a1930;
            --accent: #25D366; /* WhatsApp Green */
            --danger: #ff4d4d;
        }
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; margin: 0; padding: 20px; background: #f4f7f6; color: #333; }
        .container { max-width: 900px; margin: auto; background: white; padding: 30px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); }
        
        h1 { color: var(--primary); text-align: center; }
        
        input, textarea, select, button { width: 100%; padding: 12px; margin: 8px 0; border: 1px solid #ddd; border-radius: 6px; box-sizing: border-box; font-size: 16px; }
        
        button { background: var(--primary); color: white; border: none; cursor: pointer; font-weight: bold; transition: 0.3s; }
        button:hover { opacity: 0.9; }
        
        .auth-buttons { display: flex; gap: 10px; }
        
        /* Grid for items */
        .items-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 20px; margin-top: 20px; }
        .card { background: #fff; border: 1px solid #eee; border-radius: 10px; padding: 15px; display: flex; flex-direction: column; }
        .card img { width: 100%; height: 180px; object-fit: cover; border-radius: 6px; margin-bottom: 10px; }
        .price-tag { color: var(--primary); font-size: 1.3em; font-weight: bold; margin: 5px 0; }
        .location-tag { color: #666; font-size: 0.85em; margin-bottom: 10px; }
        
        .whatsapp-btn { background: var(--accent); color: white; text-decoration: none; text-align: center; display: block; padding: 10px; border-radius: 6px; margin-top: auto; }
        .delete-btn { background: var(--danger); margin-top: 8px; font-size: 14px; }
        
        .filter-bar { display: flex; gap: 10px; background: #eee; padding: 15px; border-radius: 8px; margin: 20px 0; }
    </style>
</head>
<body>

<div class="container">
    <h1>🇦🇪 UAE Market Hub</h1>

    <div id="auth-section">
        <input id="email" placeholder="Email">
        <input id="password" type="password" placeholder="Password">
        <div class="auth-buttons">
            <button onclick="signup()">Sign Up</button>
            <button onclick="login()">Login</button>
        </div>
        <button style="background:#555" onclick="logout()">Logout</button>
        <p id="status" style="text-align:center;">Checking session...</p>
    </div>

    <hr>

    <h2>Post an Item</h2>
    <input id="title" placeholder="What are you selling?">
    <div style="display:flex; gap:10px;">
        <input id="price" placeholder="Price (AED)">
        <select id="category">
            <option value="Electronics">Electronics</option>
            <option value="Vehicles">Vehicles</option>
            <option value="Property">Property</option>
            <option value="Furniture">Furniture</option>
            <option value="Other">Other</option>
        </select>
    </div>
    <input id="location" placeholder="Location (e.g. Dubai Marina)">
    <input id="phone" placeholder="WhatsApp Number (e.g. 971501234567)">
    <textarea id="description" placeholder="Short description..."></textarea>
    <input id="image" type="file" accept="image/*">
    <button onclick="postItem()">🚀 Post Listing</button>

    <hr>

    <h2>Marketplace</h2>
    <div class="filter-bar">
        <input id="searchBar" onkeyup="filterItems()" placeholder="Search titles...">
        <select id="filterCategory" onchange="filterItems()" style="width: 200px;">
            <option value="All">All Categories</option>
            <option value="Electronics">Electronics</option>
            <option value="Vehicles">Vehicles</option>
            <option value="Property">Property</option>
            <option value="Furniture">Furniture</option>
        </select>
    </div>

    <div id="items" class="items-grid"></div>
</div>

<script>
// --- CONFIGURATION ---
const SUPABASE_URL = "https://pseajfcwbirfplujhlye.supabase.co"
const SUPABASE_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InBzZWFqZmN3YmlyZnBsdWpobHllIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzMxMzk2NjksImV4cCI6MjA4ODcxNTY2OX0.hnDRhO7DX2n0RZoLD9LjdwxlOEch4dTwjhqzE4m_Q8Q"
const supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_KEY)

let allItems = []; // Local storage for searching

// --- AUTH FUNCTIONS ---
async function signup(){
    const email = document.getElementById("email").value;
    const password = document.getElementById("password").value;
    const { error } = await supabaseClient.auth.signUp({ email, password });
    if(error) alert(error.message); else alert("Check your email for confirmation!");
}

async function login(){
    const email = document.getElementById("email").value;
    const password = document.getElementById("password").value;
    const { error } = await supabaseClient.auth.signInWithPassword({ email, password });
    if(error) alert(error.message); else { location.reload(); }
}

async function logout(){
    await supabaseClient.auth.signOut();
    location.reload();
}

async function checkUser() {
    const { data: { user } } = await supabaseClient.auth.getUser();
    if (user) {
        document.getElementById("status").innerText = "Logged in as: " + user.email;
    } else {
        document.getElementById("status").innerText = "Not logged in";
    }
}

// --- CORE FUNCTIONS ---
async function postItem() {
    const { data: { user } } = await supabaseClient.auth.getUser();
    if(!user) return alert("You must be logged in to post!");

    const title = document.getElementById("title").value;
    const price = document.getElementById("price").value;
    const locationName = document.getElementById("location").value;
    const category = document.getElementById("category").value;
    const phone = document.getElementById("phone").value;
    const description = document.getElementById("description").value;
    const file = document.getElementById("image").files[0];

    let imageUrl = "";
    if(file) {
        const fileName = Date.now() + "-" + file.name;
        const { error: uploadError } = await supabaseClient.storage.from("images").upload(fileName, file);
        if(uploadError) return alert("Upload error: " + uploadError.message);
        const { data } = supabaseClient.storage.from("images").getPublicUrl(fileName);
        imageUrl = data.publicUrl;
    }

    const { error } = await supabaseClient.from("items").insert([{
        title, price, location: locationName, description, category, phone, image: imageUrl, user_id: user.id
    }]);

    if(error) alert(error.message); else { alert("Item posted!"); loadItems(); }
}

async function loadItems() {
    const { data } = await supabaseClient.from("items").select("*").order("id", { ascending: false });
    if(data) {
        allItems = data;
        renderDisplay(allItems);
    }
}

async function renderDisplay(dataToShow) {
    const { data: { user } } = await supabaseClient.auth.getUser();
    const currentUserId = user ? user.id : null;
    
    let html = "";
    dataToShow.forEach(item => {
        const waLink = `https://wa.me/${item.phone}?text=Hi, I saw your ${item.title} on UAE Market Hub.`;
        const isOwner = item.user_id === currentUserId;

        html += `
            <div class="card">
                ${item.image ? `<img src="${item.image}">` : ""}
                <div class="price-tag">${item.price} AED</div>
                <h3 style="margin: 5px 0;">${item.title}</h3>
                <div class="location-tag">📍 ${item.location} | ${item.category}</div>
                <p style="font-size: 0.9em; color: #444;">${item.description}</p>
                <a href="${waLink}" target="_blank" class="whatsapp-btn">💬 Chat on WhatsApp</a>
                ${isOwner ? `<button class="delete-btn" onclick="deleteItem('${item.id}')">🗑️ Delete My Item</button>` : ""}
            </div>
        `;
    });
    document.getElementById("items").innerHTML = html || "<p>No items found.</p>";
}

async function deleteItem(id) {
    if(!confirm("Are you sure you want to delete this listing?")) return;
    const { error } = await supabaseClient.from("items").delete().eq("id", id);
    if(error) alert(error.message); else loadItems();
}

function filterItems() {
    const query = document.getElementById("searchBar").value.toLowerCase();
    const cat = document.getElementById("filterCategory").value;
    
    const filtered = allItems.filter(i => {
        const matchesSearch = i.title.toLowerCase().includes(query);
        const matchesCat = cat === "All" || i.category === cat;
        return matchesSearch && matchesCat;
    });
    renderDisplay(filtered);
}

// Init
checkUser();
loadItems();
</script>

</body>
</html>
