<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>UAE Market Hub | Verified</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        :root { --primary: #0a1930; --accent: #25D366; --gold: #ffd700; --bg: #f4f7fa; }
        body { font-family: 'Segoe UI', sans-serif; margin: 0; padding: 15px; background: var(--bg); }
        .container { max-width: 1000px; margin: auto; background: white; padding: 25px; border-radius: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.05); }
        
        /* Auth UI */
        .auth-card { background: #f8f9fa; padding: 20px; border-radius: 15px; margin-bottom: 20px; border: 1px solid #eee; }
        .hidden { display: none !important; }
        
        input, select, textarea, button { width: 100%; padding: 12px; margin: 8px 0; border-radius: 10px; border: 1px solid #ddd; box-sizing: border-box; }
        button { background: var(--primary); color: white; font-weight: bold; cursor: pointer; border: none; transition: 0.3s; }
        button:hover { opacity: 0.9; }

        /* Grid */
        .items-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 20px; margin-top: 20px; }
        .card { background: white; border-radius: 15px; overflow: hidden; border: 1px solid #eee; transition: 0.3s; position: relative; display: flex; flex-direction: column; }
        .card:hover { transform: translateY(-5px); box-shadow: 0 10px 20px rgba(0,0,0,0.1); }
        .card img { width: 100%; height: 200px; object-fit: cover; }
        .card-content { padding: 15px; flex-grow: 1; }
        
        .price { font-size: 1.4em; font-weight: bold; color: var(--primary); }
        .badge { background: var(--gold); padding: 4px 8px; border-radius: 5px; font-size: 10px; font-weight: bold; position: absolute; top: 10px; right: 10px; }
        .whatsapp-btn { background: var(--accent); color: white; text-decoration: none; text-align: center; padding: 12px; border-radius: 10px; display: block; font-weight: bold; margin-top: 10px; }
    </style>
</head>
<body>

<div class="container">
    <h1>🇦🇪 UAE Market Hub</h1>

    <div id="auth-section" class="auth-card">
        <div id="logged-out-ui">
            <div style="display: flex; gap: 10px;">
                <input id="email" placeholder="Email">
                <input id="password" type="password" placeholder="Password">
            </div>
            <div style="display: flex; gap: 10px;">
                <button onclick="login()">Login</button>
                <button onclick="signup()" style="background:#555">Sign Up</button>
            </div>
        </div>
        <div id="logged-in-ui" class="hidden">
            <p id="user-greeting" style="font-weight: bold; margin: 0;"></p>
            <button onclick="logout()" style="width: auto; background: #666; padding: 5px 15px; margin-top: 10px;">Logout</button>
        </div>
        <p id="session-status" style="text-align: center; font-size: 12px; color: #888; margin-top: 10px;">Checking session...</p>
    </div>

    <div id="post-area">
        <h2>Post an Ad</h2>
        <input id="title" placeholder="Item Name">
        <input id="price" type="number" placeholder="Price (AED)">
        <input id="phone" placeholder="WhatsApp Number (971...)">
        <input id="image" type="file" accept="image/*">
        <button onclick="postItem()" style="background: var(--accent);">🚀 Publish My Ad</button>
    </div>

    <hr style="margin: 30px 0;">

    <div style="display: flex; justify-content: space-between; align-items: center;">
        <h2>Marketplace</h2>
        <div style="display: flex; gap: 10px;">
            <button onclick="loadItems()" style="width: auto; padding: 8px 15px;">🌐 All</button>
            <button onclick="loadMyAds()" style="width: auto; padding: 8px 15px; background: #e67e22;">👤 My Ads</button>
        </div>
    </div>
    
    <div id="items-list" class="items-grid"></div>
</div>

<script>
const SUPABASE_URL = "https://pseajfcwbirfplujhlye.supabase.co"
const SUPABASE_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InBzZWFqZmN3YmlyZnBsdWpobHllIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzMxMzk2NjksImV4cCI6MjA4ODcxNTY2OX0.hnDRhO7DX2n0RZoLD9LjdwxlOEch4dTwjhqzE4m_Q8Q"
const supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_KEY)
const ADMIN_PHONE = "971501234567"; // Update to your number

// --- AUTH LOGIC ---
async function login() {
    const email = document.getElementById("email").value;
    const password = document.getElementById("password").value;
    const { error } = await supabaseClient.auth.signInWithPassword({ email, password });
    if(error) alert(error.message); else location.reload();
}

async function signup() {
    const email = document.getElementById("email").value;
    const password = document.getElementById("password").value;
    const { error } = await supabaseClient.auth.signUp({ email, password });
    if(error) alert(error.message); else alert("Check email for verification!");
}

async function logout() {
    await supabaseClient.auth.signOut();
    location.reload();
}

// --- DATA LOGIC ---
async function postItem() {
    const { data: { user } } = await supabaseClient.auth.getUser();
    if(!user) return alert("Login required!");

    const file = document.getElementById("image").files[0];
    let imageUrl = "";
    if(file) {
        const fileName = `${Date.now()}-${file.name}`;
        await supabaseClient.storage.from("images").upload(fileName, file);
        imageUrl = supabaseClient.storage.from("images").getPublicUrl(fileName).data.publicUrl;
    }

    const { error } = await supabaseClient.from("items").insert([{
        title: document.getElementById("title").value,
        price: document.getElementById("price").value,
        phone: document.getElementById("phone").value,
        image: imageUrl,
        user_id: user.id
    }]);

    if(error) alert(error.message); else { alert("Ad Posted!"); loadItems(); }
}

async function loadItems() {
    const { data } = await supabaseClient.from("items").select("*").order("is_featured", { ascending: false }).order("id", { ascending: false });
    renderDisplay(data || []);
}

async function loadMyAds() {
    const { data: { user } } = await supabaseClient.auth.getUser();
    if(!user) return alert("Login first!");
    const { data } = await supabaseClient.from("items").select("*").eq("user_id", user.id).order("id", { ascending: false });
    renderDisplay(data || []);
}

async function renderDisplay(data) {
    const { data: { user } } = await supabaseClient.auth.getUser();
    let html = "";
    data.forEach(item => {
        const isOwner = user && item.user_id === user.id;
        html += `
            <div class="card" style="${item.is_featured ? 'border: 2px solid var(--gold)' : ''}">
                ${item.is_featured ? '<span class="badge">⭐ FEATURED</span>' : ''}
                <img src="${item.image || 'https://via.placeholder.com/300x200'}" loading="lazy">
                <div class="card-content">
                    <div class="price">${item.price} AED</div>
                    <div style="font-weight:bold; margin-bottom:10px;">${item.title}</div>
                    <a href="https://wa.me/${item.phone}" target="_blank" class="whatsapp-btn">💬 WhatsApp</a>
                    ${isOwner ? `
                        <a href="https://wa.me/${ADMIN_PHONE}?text=Boost Ad ID: ${item.id}" target="_blank" style="display:block; text-align:center; font-size:12px; color:var(--primary); margin-top:10px; font-weight:bold;">🚀 Boost this Ad</a>
                        <button onclick="deleteItem('${item.id}')" style="background:none; color:red; border:none; font-size:11px; margin-top:10px;">Delete Ad</button>
                    ` : ""}
                </div>
            </div>
        `;
    });
    document.getElementById("items-list").innerHTML = html || "No ads found.";
}

async function deleteItem(id) {
    if(confirm("Delete ad?")) {
        await supabaseClient.from("items").delete().eq("id", id);
        loadItems();
    }
}

// --- INITIALIZATION (THE FIX) ---
(async () => {
    // Fail-safe: Always try to load items after 1.5 seconds even if auth is stuck
    const failSafe = setTimeout(() => {
        if(document.getElementById("session-status").innerText === "Checking session...") {
            document.getElementById("session-status").innerText = "Connection slow... loading ads anyway.";
            loadItems();
        }
    }, 1500);

    const { data: { user } } = await supabaseClient.auth.getUser();
    clearTimeout(failSafe); // Auth responded, stop the fail-safe timer

    if (user) {
        document.getElementById("logged-out-ui").classList.add("hidden");
        document.getElementById("logged-in-ui").classList.remove("hidden");
        document.getElementById("user-greeting").innerText = `Welcome, ${user.email}`;
        document.getElementById("session-status").innerText = "Logged in successfully.";
    } else {
        document.getElementById("session-status").innerText = "Not logged in.";
    }
    loadItems();
})();
</script>

</body>
</html>
