<!DOCTYPE html>
<html>
<head>
<title>UAE Market Hub</title>

<style>

body{
font-family:Arial;
background:#f4f4f4;
margin:0;
}

header{
background:#0a66c2;
color:white;
padding:20px;
text-align:center;
}

.container{
width:90%;
margin:auto;
}

form{
background:white;
padding:20px;
margin-top:20px;
border-radius:8px;
box-shadow:0 2px 5px rgba(0,0,0,0.2);
}

input,textarea{
width:100%;
padding:10px;
margin:8px 0;
border:1px solid #ddd;
border-radius:4px;
}

button{
background:#0a66c2;
color:white;
border:none;
padding:10px 15px;
cursor:pointer;
border-radius:4px;
}

.products{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
gap:20px;
margin-top:20px;
margin-bottom:40px;
}

.card{
background:white;
padding:15px;
border-radius:8px;
box-shadow:0 2px 5px rgba(0,0,0,0.2);
}

.card img{
width:100%;
height:200px;
object-fit:cover;
border-radius:6px;
}

.price{
color:green;
font-weight:bold;
font-size:18px;
}

</style>

</head>

<body>

<header>
<h1>UAE Market Hub</h1>
<p>Buy & Sell in UAE</p>
</header>

<div class="container">

<form onsubmit="addItem(); return false;">

<h2>Post an Item</h2>

<input id="title" placeholder="Item Title" required>

<input id="price" placeholder="Price (AED)" required>

<input id="location" placeholder="Location" required>

<input id="whatsapp" placeholder="WhatsApp Number (971xxxxxxxx)" required>

<input type="file" id="image">

<textarea id="desc" placeholder="Item Description"></textarea>

<button type="submit">Post Item</button>

</form>


<h2>Latest Listings</h2>

<div class="products" id="products"></div>

</div>


<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>

<script>

const supabaseClient = supabase.createClient(
"https://pseajfcwbirfplujhlye.supabase.co",
"sb_publishable_HAbdc8lqEmdvOaj5GSwxDg_V0exTvey"
);


async function addItem(){

let title=document.getElementById("title").value;
let price=document.getElementById("price").value;
let location=document.getElementById("location").value;
let whatsapp=document.getElementById("whatsapp").value;
let desc=document.getElementById("desc").value;

let file=document.getElementById("image").files[0];

let imageUrl="";

if(file){

let fileName=Date.now()+"_"+file.name;

const {data,error}=await supabaseClient.storage
.from("images")
.upload(fileName,file);

if(error){
alert("Image upload failed");
console.log(error);
return;
}

imageUrl=`https://pseajfcwbirfplujhlye.supabase.co/storage/v1/object/public/images/${fileName}`;

}

const { data, error } = await supabaseClient
.from("items")
.insert([
{
title:title,
price:price,
location:location,
whatsapp:whatsapp,
desc:desc,
image:imageUrl
}
]);

if(error){
alert("Error posting item");
console.log(error);
return;
}

alert("Item posted successfully");

document.querySelector("form").reset();

loadItems();

}



async function loadItems(){

const { data, error } = await supabaseClient
.from("items")
.select("*")
.order("id",{ascending:false});

let container=document.getElementById("products");

container.innerHTML="";

if(!data) return;

data.forEach(item=>{

container.innerHTML+=`

<div class="card">

<img src="${item.image}">

<h3>${item.title}</h3>

<div class="price">AED ${item.price}</div>

<p>${item.desc}</p>

<p><b>Location:</b> ${item.location}</p>

<a href="https://wa.me/${item.whatsapp}" target="_blank">

<button>Chat on WhatsApp</button>

</a>

</div>

`;

});

}

loadItems();

</script>

</body>
</html>
